<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Owner Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/app.css" />
  <link rel="stylesheet" href="assets/css/command.css" />
  <link rel="stylesheet" href="assets/css/owner.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232e5bd7'/><text x='50' y='69' font-size='58' text-anchor='middle' fill='%23ffffff' font-family='Arial' font-weight='bold'>$</text></svg>" />
</head>
<body class="app">

  <!-- Locked screen shown until an owner session is confirmed by the API -->
  <div id="gate" class="owner-gate">
    <div class="owner-gate-card">
      <div class="owner-gate-mark">$</div>
      <h1>Owner Console</h1>
      <p id="gateMsg">Confirming owner access…</p>
      <a class="btn btn-primary btn-sm" id="gateLogin" href="/login" style="display:none">Sign in</a>
    </div>
  </div>

  <div class="shell" id="shell" style="display:none">
    <aside class="sidebar cmd-side">
      <a href="#overview" class="brand"><span class="logo" style="background:var(--warn)">$</span><span>Owner<span class="os">OS</span></span></a>

      <div class="ws-card">
        <div class="ws-name">Owner Console</div>
        <div class="ws-plan" id="ownerEmail">private</div>
      </div>

      <div class="motion-toggle" id="windowToggle" style="grid-template-columns:1fr 1fr 1fr 1fr">
        <button class="mt" data-window="today">Today</button>
        <button class="mt" data-window="7d">7d</button>
        <button class="mt active" data-window="30d">30d</button>
        <button class="mt" data-window="all">All</button>
      </div>

      <nav class="cmd-nav" id="ownerNav">
        <div class="nav-group">Business</div>
        <a class="nav-item" data-route="overview">Overview</a>
        <a class="nav-item" data-route="pricing">Pricing</a>
        <a class="nav-item" data-route="spend">Spend</a>

        <div class="nav-group">People</div>
        <a class="nav-item" data-route="people">Users &amp; roles</a>

        <div class="nav-group">Operate</div>
        <a class="nav-item" data-route="accounts">Accounts</a>
        <a class="nav-item" data-route="costs">Cost model</a>
        <a class="nav-item" data-route="security">Security</a>
      </nav>

      <div class="side-foot">
        <div class="side-link" id="userChip">
          <span class="avatar" style="width:26px;height:26px;font-size:11px;background:var(--warn);color:#fff" id="userInitials">$</span>
          <span id="userName">Owner</span>
        </div>
        <div class="side-link" id="signOut">Sign out</div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <div class="crumb">Owner Console · private</div>
          <h1 id="pageTitle">Overview</h1>
        </div>
        <div class="spacer"></div>
        <span class="env-pill live" id="windowPill">30d</span>
      </div>

      <div class="panel-wrap">
        <section class="panel active" id="view"></section>
      </div>
    </main>
  </div>

  <!-- Slide-over account detail drawer -->
  <div class="drawer-scrim" id="scrim"></div>
  <aside class="drawer" id="drawer"><div class="drawer-body" id="drawerBody"></div></aside>

  <div class="toast" id="toast"></div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/owner.js"></script>
</body>
</html>
