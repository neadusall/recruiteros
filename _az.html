<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="assets/css/styles.css" />
<link rel="stylesheet" href="assets/css/app.css" />
<link rel="stylesheet" href="assets/css/command.css" />
<link rel="stylesheet" href="assets/css/campaign-studio.css" />
</head>
<body class="app">
<div class="shell">
  <aside class="sidebar cmd-side"><div class="brand">RecruiterOS</div></aside>
  <main class="main">
    <div class="topbar"><div><div class="crumb">Demo</div><h1>Campaign Studio</h1></div></div>
    <div class="panel-wrap"><section class="panel active"><div id="view"></div></section></div>
  </main>
</div>
<script src="assets/js/campaign-studio.js"></script>
<script>
  CampaignStudio.mount(document.getElementById("view"), { motion: "recruiting", embedded: true });
  var zl = function(){ return document.querySelector('[data-cs="zoomlabel"]').textContent; };
  setTimeout(function(){
    var before = zl();
    document.querySelector('[data-cs="palToggle"]').click();
    document.querySelector('[data-cs="inspToggle"]').click();
    setTimeout(function(){
      document.querySelector('.topbar h1').textContent = "zoom " + before + " -> " + zl() + " (both collapsed)";
    }, 500);
  }, 500);
</script>
</body></html>
