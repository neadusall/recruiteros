<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180" role="img" aria-label="Legal">
  <defs>
    <linearGradient id="lg-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C2A3A"/>
      <stop offset="0.55" stop-color="#21465B"/>
      <stop offset="1" stop-color="#0080A0"/>
    </linearGradient>
    <linearGradient id="lg-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#19A9C9" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#19A9C9" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="180" fill="url(#lg-bg)"/>
  <circle cx="500" cy="20" r="150" fill="url(#lg-shine)"/>
  <g transform="translate(300 90)" stroke="#EAF6F6" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <!-- central column -->
    <line x1="0" y1="-52" x2="0" y2="44"/>
    <!-- base -->
    <line x1="-26" y1="46" x2="26" y2="46"/>
    <line x1="-16" y1="44" x2="16" y2="44"/>
    <!-- top knob -->
    <circle cx="0" cy="-56" r="4.2" fill="#EAF6F6"/>
    <!-- beam -->
    <line x1="-78" y1="-44" x2="78" y2="-44"/>
    <!-- hangers -->
    <line x1="-78" y1="-44" x2="-78" y2="-30"/>
    <line x1="78" y1="-44" x2="78" y2="-30"/>
    <!-- left pan strings -->
    <line x1="-78" y1="-30" x2="-104" y2="6"/>
    <line x1="-78" y1="-30" x2="-52" y2="6"/>
    <!-- left pan -->
    <path d="M-110 6 a32 18 0 0 0 64 0"/>
    <!-- right pan strings -->
    <line x1="78" y1="-30" x2="52" y2="6"/>
    <line x1="78" y1="-30" x2="104" y2="6"/>
    <!-- right pan -->
    <path d="M46 6 a32 18 0 0 0 64 0"/>
  </g>
</svg>
