<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>A quick message for you</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{ --bg:#f7f8fa; --card:#ffffff; --line:#e5e8ee; --ink:#14181f; --mut:#4b5364; --brand:#2e5bd7; --accent:#2e5bd7; --book:#157347; --on-accent:#ffffff; }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15.5px/1.5 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  .top{flex:none;display:flex;align-items:center;justify-content:space-between;padding:9px 26px}
  .brand{font-weight:600;letter-spacing:-.3px;font-size:19px;color:var(--ink)}
  .top .from{font-size:12px;color:var(--mut)}
  main{flex:1;min-height:0;display:flex;align-items:flex-start;justify-content:center;padding:2px 26px 10px}
  .stage{width:100%;max-width:1140px}
  .stage.wide{}
  .cols{display:block}
  .cols.has-cal{display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:24px;align-items:start}
  @media (max-width:920px){ .cols.has-cal{grid-template-columns:1fr} }
  .maincol{min-width:0;display:flex;flex-direction:column}
  .ctx{flex:none;margin:0 0 10px}
  .ctx h1{font-size:21px;margin:0;font-weight:600;letter-spacing:-.4px;line-height:1.25}
  .player{flex:none;height:380px;min-height:280px;position:relative;border-radius:12px;overflow:hidden;
    background:#0b1220;box-shadow:0 4px 16px rgba(16,24,40,.10);display:flex;align-items:center;justify-content:center}
  video{position:absolute;inset:0;width:100%;height:100%;display:block;object-fit:contain;background:#0b1220}
  .player .label{position:absolute;bottom:14px;left:18px;color:#8a93a5;font-size:12px;z-index:1}
  .player .dur{position:absolute;top:14px;right:16px;background:rgba(0,0,0,.5);color:#fff;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;z-index:1}
  .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2}
  .play .btn{width:74px;height:74px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;transition:transform .15s}
  .play:hover .btn{transform:scale(1.05)}
  .play svg{width:28px;height:28px;margin-left:5px;fill:var(--on-accent)}
  .cta{flex:none;display:flex;gap:10px;margin-top:14px;align-items:center;flex-wrap:wrap}
  .cta a,.cta button{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--ink);
    text-decoration:none;padding:11px 20px;border-radius:6px;font:inherit;font-weight:500;cursor:pointer;transition:all .12s}
  .cta a:hover{border-color:#cfd5df}
  .cta a.primary{background:var(--book);border-color:var(--book);color:var(--on-accent)}
  .cta .hint{color:var(--mut);font-size:12px;margin-left:2px;border:0;background:none;box-shadow:none;padding:0}
  .side{display:flex;flex-direction:column;min-height:0}
  .side-h{flex:none;display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--ink);margin:0 0 9px}
  .side-h .ico{width:15px;height:15px;fill:var(--book)}
  .cal{flex:none;height:680px;min-height:480px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff;transition:outline .15s}
  .cal iframe{width:100%;height:100%;border:0;display:block}
  .cal.flash{outline:3px solid var(--book);outline-offset:3px}
  /* Reply modal */
  .mov{position:fixed;inset:0;background:rgba(16,24,40,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .mov.open{display:flex}
  .modal{width:100%;max-width:460px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:24px;box-shadow:0 12px 32px rgba(16,24,40,.16)}
  .modal h3{margin:0 0 3px;font-size:18px;font-weight:600}
  .modal .msub{margin:0 0 15px;color:var(--mut);font-size:13px}
  .modal textarea{width:100%;background:#fff;border:1px solid #cfd5df;color:var(--ink);border-radius:6px;padding:12px;font:inherit;resize:vertical;min-height:104px}
  .modal input{width:100%;margin-top:10px;background:#fff;border:1px solid #cfd5df;color:var(--ink);border-radius:6px;padding:12px;font:inherit}
  .macts{display:flex;justify-content:flex-end;gap:9px;margin-top:15px}
  .macts button{appearance:none;font:inherit;font-weight:500;padding:11px 20px;border-radius:6px;cursor:pointer;border:1px solid var(--line)}
  .macts .ghost{background:transparent;color:var(--ink)}
  .macts .send{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
  .mok{text-align:center;padding:30px 12px;color:var(--book);font-weight:500;font-size:16px}
  .err{text-align:center;color:var(--mut);padding:60px 20px}
  @media (max-width:920px){ body{height:auto;overflow:auto} .player{height:auto;aspect-ratio:16/10} .cal{height:560px} }
</style>
</head>
<body>
<div class="top"><span class="brand">RecruitersOS</span><span class="from" id="fromLine"></span></div>
<main>
  <div class="stage" id="stage"><div class="err" id="loading">Loading…</div></div>
</main>

<div class="mov" id="replyModal">
  <div class="modal" id="replyCard">
    <h3 id="replyTitle">Reply</h3>
    <p class="msub">Send a quick message, it goes straight to their inbox.</p>
    <textarea id="rMsg" placeholder="Type your reply…"></textarea>
    <input id="rEmail" type="email" placeholder="Your email (so they can reply back)" />
    <div class="macts">
      <button class="ghost" id="rCancel" type="button">Cancel</button>
      <button class="send" id="rSend" type="button">Send reply</button>
    </div>
  </div>
</div>

<script src="assets/js/config.js"></script>
<script>
(function(){
  var API = (window.RECRUITEROS_API_BASE || "").replace(/\/$/,"");
  var qs = new URLSearchParams(location.search);
  var key = qs.get("k") || qs.get("key") || "";
  var company = qs.get("c") || "";
  var role = qs.get("r") || "";
  var name = (qs.get("n") || "").trim();      // recipient first name
  var replyTo = qs.get("e") || "";
  var calLink = qs.get("cal") || "";          // booking URL (TidyCal/Calendly/Cal.com)
  var rcpt = qs.get("rcpt") || "";
  var prospectEmail = qs.get("pe") || "";     // the address the email was sent to, prefilled so the prospect needn't type it
  var logo = qs.get("logo") || "";
  var accent = qs.get("ac") || "";
  var brandName = (qs.get("bn") || "").trim();
  var ctaText = (qs.get("cta") || "").trim();
  var ctaUrl = qs.get("ctaurl") || "";
  var s = qs.get("s") || "";                 // short-code path: vid.<domain>/v/<code>
  var stage = document.getElementById("stage");
  var RESOLVED = null;
  var brandLabel = "RecruitersOS", trackKey = "";
  var isHttp = function (u) { return /^https?:\/\//i.test(u || ""); };
  function esc(s){ return String(s).replace(/[&<>"]/g, function(c){ return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"})[c]; }); }
  function $(id){ return document.getElementById(id); }

  if (s && !key) {
    fetch(API + "/api/in-market/resolve?s=" + encodeURIComponent(s))
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(d){
        if (!d || d.error || !d.key) { stage.innerHTML = '<div class="err">This link looks incomplete or expired.</div>'; return; }
        RESOLVED = d; company = d.company || company; role = d.role || role;
        var br = d.brand || {};
        logo = br.logoUrl || logo; accent = br.accent || accent; brandName = (br.brandName || brandName || "").trim();
        ctaText = (br.ctaText || ctaText || "").trim(); ctaUrl = br.ctaUrl || ctaUrl;
        calLink = br.calendarUrl || calLink; replyTo = br.replyEmail || replyTo;
        go();
      })
      .catch(function(){ stage.innerHTML = '<div class="err">This video isn\'t available right now.</div>'; });
    return;
  }
  go();

  function go(){
  if (/\{\{|\}\}/.test(name)) name = "";
  if (/\{\{|\}\}/.test(brandName)) brandName = "";
  if (/^#[0-9a-f]{6}$/i.test(accent)) document.documentElement.style.setProperty("--accent", accent);
  brandLabel = brandName || "RecruitersOS";
  var topEl = document.querySelector(".top .brand");
  if (topEl) { if (isHttp(logo)) topEl.outerHTML = '<img src="' + logo.replace(/"/g, "%22") + '" alt="" style="max-height:30px;max-width:200px;display:block" />'; else topEl.textContent = brandLabel.replace(/[<>&]/g, ""); }
  var fromEl = $("fromLine");
  if (fromEl) fromEl.textContent = (name ? "A note for " + name : "A quick note") + (company ? " · " + company : "");
  var rt = $("replyTitle"); if (rt) rt.textContent = "Reply to " + brandLabel.replace(/[<>&]/g, "");
  document.title = company ? ("A quick note about " + company) : ("A message from " + brandLabel);

  // Asset URLs: resolved short code (already signed) or built from the key + signed query.
  var mp4, gif;
  if (RESOLVED) {
    trackKey = RESOLVED.key; mp4 = RESOLVED.mp4;
    gif = RESOLVED.gif + (RESOLVED.gif.indexOf("?") >= 0 ? "&" : "?") + "notrack=1";
  } else {
    if (!key || !/^[a-z0-9_-]{3,120}$/.test(key)) { stage.innerHTML = '<div class="err">This link looks incomplete or expired.</div>'; return; }
    var auth = "";
    var exp = qs.get("exp"), sig = qs.get("sig");
    if (exp && sig) auth = "&exp=" + encodeURIComponent(exp) + "&sig=" + encodeURIComponent(sig);
    trackKey = key;
    mp4 = API + "/api/in-market/watch?key=" + encodeURIComponent(key) + "&fmt=mp4" + auth;
    gif = API + "/api/in-market/watch?key=" + encodeURIComponent(key) + "&fmt=gif&notrack=1" + auth;
  }

  /* engagement tracking (anonymous session) */
  var sid;
  try { sid = sessionStorage.getItem("ros_sid"); if (!sid) { sid = (Math.random().toString(36).slice(2) + Date.now().toString(36)); sessionStorage.setItem("ros_sid", sid); } } catch (e) { sid = "anon"; }
  function track(t, secs) {
    try {
      var payload = JSON.stringify({ k: trackKey, t: t, c: company, r: role, sid: sid, s: secs, rcpt: rcpt });
      var url = API + "/api/in-market/track";
      if (navigator.sendBeacon) navigator.sendBeacon(url, new Blob([payload], { type: "text/plain" }));
      else fetch(url, { method: "POST", body: payload, keepalive: true });
    } catch (e) {}
  }

  var title = (name ? esc(name) + ", " : "") + "a quick note about " + esc(company || "your team");
  var hasCal = isHttp(calLink);
  var bookUrl = isHttp(ctaUrl) ? ctaUrl : (isHttp(calLink) ? calLink : "");
  var bookLabel = ctaText || "Book a call";

  var cta = "";
  if (hasCal) cta += '<a class="primary" id="bookBtn" href="#">' + esc(bookLabel) + '</a>';
  else if (bookUrl) cta += '<a class="primary" href="' + esc(bookUrl) + '" target="_blank" rel="noopener">' + esc(bookLabel) + '</a>';
  cta += '<a id="replyBtn" href="#">Reply</a>';
  if (hasCal) cta += '<span class="hint">or grab a time on the right →</span>';

  var leftCol =
    '<div class="ctx"><h1>' + title + '</h1></div>' +
    '<div class="player" id="player">' +
      '<span class="dur" id="dur" style="display:none"></span>' +
      '<video id="vid" playsinline preload="metadata" poster="' + gif + '"></video>' +
      '<div class="play" id="overlay"><div class="btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>' +
      (role ? '<span class="label">' + esc(role) + '</span>' : '') +
    '</div>' +
    '<div class="cta">' + cta + '</div>';
  var rightCol = hasCal
    ? '<aside class="side"><div class="side-h"><svg class="ico" viewBox="0 0 24 24"><path d="M7 2v2H5a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2V2h-2v2H9V2H7zm12 6v11H5V8h14z"/></svg>Book a call</div>' +
        '<div class="cal" id="cal"><iframe src="' + esc(calLink) + '" title="Book a time" loading="eager"></iframe></div></aside>'
    : '';
  if (hasCal) stage.className = "stage wide";
  stage.innerHTML = '<div class="cols' + (hasCal ? ' has-cal' : '') + '"><div class="maincol">' + leftCol + '</div>' + rightCol + '</div>';

  // Book a call → scroll to + highlight the embedded calendar.
  var book = $("bookBtn");
  if (book) book.addEventListener("click", function(e){
    e.preventDefault();
    var side = document.querySelector(".side"), cal = $("cal");
    if (side) side.scrollIntoView({ behavior:"smooth", block:"center" });
    if (cal){ cal.classList.add("flash"); setTimeout(function(){ cal.classList.remove("flash"); }, 1300); }
  });

  // Reply → pop-up that posts to the lead endpoint (emails the sender).
  var modal = $("replyModal");
  function openM(){ modal.classList.add("open"); var t=$("rMsg"); if(t) t.focus(); }
  function closeM(){ modal.classList.remove("open"); }
  // Prefill the reply-from address with the email the message was sent to, and hide the field -
  // the prospect just types a message and hits send.
  if (prospectEmail && $("rEmail")) { $("rEmail").value = prospectEmail; $("rEmail").style.display = "none"; }
  var reply = $("replyBtn"); if (reply) reply.addEventListener("click", function(e){ e.preventDefault(); openM(); });
  var cancel = $("rCancel"); if (cancel) cancel.addEventListener("click", closeM);
  if (modal) modal.addEventListener("click", function(e){ if (e.target === modal) closeM(); });
  document.addEventListener("keydown", function(e){ if (e.key === "Escape") closeM(); });
  var sendBtn = $("rSend");
  if (sendBtn) sendBtn.addEventListener("click", function(){
    var msg = ($("rMsg").value || "").trim(), em = ($("rEmail").value || "").trim();
    if (!msg && !em) { $("rMsg").focus(); return; }
    try {
      var payload = JSON.stringify({ k: trackKey, type: "reply", message: msg, email: em, name: name, c: company, r: role, rcpt: rcpt });
      if (navigator.sendBeacon) navigator.sendBeacon(API + "/api/in-market/lead", new Blob([payload], { type: "text/plain" }));
      else fetch(API + "/api/in-market/lead", { method: "POST", body: payload, keepalive: true });
    } catch (e2) {}
    $("replyCard").innerHTML = '<div class="mok">✓ Sent' + (name ? ", " + esc(name) : "") + ", thanks! They'll get back to you shortly.</div>";
    setTimeout(closeM, 1900);
  });

  /* video */
  var vid = $("vid"), overlay = $("overlay");
  vid.src = mp4;
  vid.addEventListener("loadedmetadata", function(){
    var d = vid.duration; if (d && isFinite(d)) { var m = Math.floor(d/60), sec = Math.round(d%60); var el = $("dur"); if (el){ el.textContent = m + ":" + (sec<10?"0":"") + sec; el.style.display = "block"; } }
  });
  vid.addEventListener("error", function(){ $("player").innerHTML = '<div class="err">This video isn\'t available right now.</div>'; });
  function start(){ if (vid.ended) vid.currentTime = 0; vid.play(); vid.controls = true; overlay.style.display = "none"; }
  overlay.addEventListener("click", start);

  track("open");

  var played = false, lastBeat = 0, beatTimer = null;
  vid.addEventListener("play", function(){
    overlay.style.display = "none";
    if (!played) { played = true; track("play"); }
    lastBeat = vid.currentTime;
    if (!beatTimer) beatTimer = setInterval(function(){
      if (!vid.paused && !vid.ended) { var d = vid.currentTime - lastBeat; if (d > 0) { track("heartbeat", d); lastBeat = vid.currentTime; } }
    }, 10000);
  });
  function flushBeat(){ if (played) { var d = vid.currentTime - lastBeat; if (d > 0.5) { track("heartbeat", d); lastBeat = vid.currentTime; } } }
  vid.addEventListener("pause", flushBeat);
  vid.addEventListener("ended", function(){ flushBeat(); track("complete"); vid.controls = false; overlay.style.display = "flex"; });
  window.addEventListener("pagehide", flushBeat);
  document.addEventListener("visibilitychange", function(){ if (document.visibilityState === "hidden") flushBeat(); });

  } // end go()
})();
</script>
</body>
</html>
