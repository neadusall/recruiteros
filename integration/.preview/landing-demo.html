<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>A quick message for you</title>
<style>
  :root{ --bg:#0b0f14; --panel:#11161d; --line:#222a35; --ink:#e6edf3; --mut:#93a1b0; --grn:#19c37d; }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 50% -10%, #16202b, var(--bg));color:var(--ink);
    font:16px/1.6 system-ui,Segoe UI,Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column}
  .top{display:flex;align-items:center;gap:10px;padding:18px 24px}
  .brand{font-weight:700;letter-spacing:.2px;font-size:19px;background:linear-gradient(90deg,#19c37d,#58a6ff);-webkit-background-clip:text;background-clip:text;color:transparent}
  main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:16px 20px 48px}
  .stage{width:100%;max-width:1180px}
  .ctx{margin:0 0 16px}
  .ctx h1{font-size:22px;margin:0 0 4px;font-weight:650}
  .ctx p{margin:0;color:var(--mut);font-size:14px}
  .cols{display:grid;grid-template-columns:minmax(0,1fr) 400px;gap:28px;align-items:start}
  @media (max-width:960px){ .cols{grid-template-columns:1fr} }
  .maincol{min-width:0}
  .player{position:relative;border:1px solid var(--line);border-radius:16px;overflow:hidden;
    background:linear-gradient(135deg,#0e1620,#0a0e13);box-shadow:0 24px 80px rgba(0,0,0,.55);aspect-ratio:1000/620;
    display:flex;align-items:center;justify-content:center}
  .player .label{position:absolute;bottom:14px;left:16px;color:#5b6675;font-size:12px}
  .play .btn{width:84px;height:84px;border-radius:50%;background:var(--grn);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px rgba(25,195,125,.5)}
  .play svg{width:34px;height:34px;margin-left:5px;fill:#06231a}
  .cta{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap}
  .cta a{appearance:none;border:1px solid var(--line);background:#1a222c;color:var(--ink);
    text-decoration:none;padding:11px 20px;border-radius:10px;font:inherit;font-weight:600}
  .cta a.primary{background:var(--grn);border-color:var(--grn);color:#06231a}
  .reply{margin:20px 0 0;border:1px solid var(--line);border-radius:14px;padding:15px;background:var(--panel);max-width:560px}
  .reply .rh{font-size:13px;font-weight:600;margin-bottom:9px}
  .reply textarea{width:100%;background:#0a0e13;border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:10px;font:inherit;resize:vertical}
  .reply .rrow{display:flex;gap:8px;margin-top:9px}
  .reply .rrow input{flex:1;background:#0a0e13;border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:10px;font:inherit}
  .reply .rrow button{border:1px solid var(--grn);background:var(--grn);color:#06231a;border-radius:9px;padding:10px 18px;font:inherit;font-weight:700}
  .side{position:sticky;top:20px}
  .side-h{font-size:12px;font-weight:700;color:var(--mut);margin:0 0 10px;text-transform:uppercase;letter-spacing:.06em}
  .cal{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;box-shadow:0 24px 80px rgba(0,0,0,.45)}
  .cal iframe{width:100%;height:640px;border:0;display:block}
  footer{text-align:center;color:#5b6675;font-size:12px;padding:18px}
</style>
</head>
<body>
<div class="top"><span class="brand">Lumesp</span></div>
<main>
  <div class="stage">
    <div class="ctx"><h1>Sarah — a quick note about Acme Corp</h1><p>Re: VP of Engineering</p></div>
    <div class="cols">
      <div class="maincol">
        <div class="player">
          <div class="play"><div class="btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
          <span class="label">your 42-second video — you, over their job posting</span>
        </div>
        <div class="cta"><a class="primary" href="#">Book a call</a><a href="#">Reply</a></div>
        <form class="reply" onsubmit="return false">
          <div class="rh">Send a quick reply</div>
          <textarea rows="3" placeholder="Type a quick reply…"></textarea>
          <div class="rrow"><input type="email" placeholder="Your email (optional)" /><button type="submit">Send</button></div>
        </form>
      </div>
      <aside class="side">
        <div class="side-h">Book a time</div>
        <div class="cal"><iframe src="https://tidycal.com/neadusall/new-position-discovery-call" title="Book a time" loading="eager"></iframe></div>
      </aside>
    </div>
  </div>
</main>
<footer>Sent with Lumesp</footer>
</body>
</html>
