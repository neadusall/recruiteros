<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set a new password, RecruitersOS</title>
  <meta name="description" content="Choose a new password for your RecruitersOS account." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css?v=3b77f2915a" />
  <link rel="stylesheet" href="assets/css/auth.css?v=6348626ce1" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%237c5cff'/><text x='50' y='70' font-size='62' text-anchor='middle' fill='%230a0a12' font-family='Arial' font-weight='bold'>R</text></svg>" />
</head>
<body class="auth-body">
  <div class="aurora"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span></div>
  <div class="grid-bg"></div>

  <div class="auth-split">
    <aside class="auth-aside">
      <a href="/" class="brand"><span class="logo">R</span><span>Recruiters<span class="os">OS</span></span></a>
      <h1>Almost there.<br /><span class="gradient-text">Pick a new password.</span></h1>
      <p>Make it at least 8 characters. Once you save it, you'll be signed straight into your command center.</p>
      <div class="auth-trust">Enterprise-grade security · SOC 2 aligned · Your ATS stays the source of truth</div>
    </aside>

    <main class="auth-card-wrap">
      <div class="auth-card">
        <h2 id="title">Set a new password</h2>
        <p class="auth-sub" id="forEmail">Choose something secure.</p>

        <form id="resetForm" autocomplete="on" novalidate>
          <label class="fld">
            <span>New password</span>
            <input id="password" type="password" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" required />
            <i class="strength" id="strength"></i>
          </label>
          <label class="fld">
            <span>Confirm password</span>
            <input id="confirm" type="password" placeholder="Re-enter your password" autocomplete="new-password" minlength="8" required />
          </label>
          <button type="submit" class="btn btn-primary btn-lg btn-block" id="submitBtn">Save and sign in →</button>
        </form>

        <p class="auth-msg" id="msg"></p>
        <p class="auth-fine"><a href="/login">Back to sign in</a></p>
      </div>
    </main>
  </div>

  <script src="assets/js/pw-toggle.js?v=b8d3cfa7e4"></script>
  <script src="assets/js/local-backend.js?v=3cda9df524"></script>
  <script src="assets/js/config.js?v=ad110cbee0"></script>
  <script src="assets/js/reset.js?v=8925d30887"></script>
</body>
</html>
