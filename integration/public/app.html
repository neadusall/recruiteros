<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening RecruitersOS…</title>
  <link rel="stylesheet" href="assets/css/styles.css?v=cded6c8cf8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232e5bd7'/><text x='50' y='69' font-size='58' text-anchor='middle' fill='%23ffffff' font-family='Arial' font-weight='bold'>R</text></svg>" />
  <script>
    // The old prototype is now the portal entry point. Send signed-in users to
    // the Command Center, everyone else to sign in. Keeps every "Open app" CTA
    // across the marketing site flowing into the real auth workflow.
    (function () {
      var hasSession = false;
      try { hasSession = !!localStorage.getItem("ros_ctx"); } catch (e) {}
      location.replace(hasSession ? "command.html" : "login.html");
    })();
  </script>
</head>
<body class="auth-body">
  <noscript>
    <p style="text-align:center;margin-top:40px;font-family:sans-serif">
      Continue to <a href="/login" style="color:#2e5bd7">sign in</a>.
    </p>
  </noscript>
</body>
</html>
