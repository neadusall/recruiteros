<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Call</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/app.css" />
  <link rel="stylesheet" href="assets/css/command.css" />
  <script>(function(){try{
    var q=new URLSearchParams(location.search);
    var t=q.get("theme")||localStorage.getItem("ros_theme");
    if(!t)t=(window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";
    document.documentElement.setAttribute("data-theme",t==="dark"?"dark":"light");
  }catch(e){}})();</script>
  <style>
    /* Popup dialer: one compact column. The BD Phone engine's floating call
       bar/keypad/notes mount at the bottom of this same page, so the shell
       reserves room for them. */
    html, body.pwg { height: 100%; }
    body.pwg {
      margin: 0; background: var(--bg); color: var(--text);
      font: 400 14px/1.45 var(--font, Inter, system-ui, sans-serif);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .pwg-head {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .pwg-head .isvg { width: 15px; height: 15px; color: var(--brand); }
    .pwg-title { font-weight: 600; font-size: 13px; }
    .pwg-line { margin-left: auto; font-size: 11.5px; color: var(--text-muted); }
    .pwg-main {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px; padding: 20px 20px 110px; text-align: center;
    }
    .pwg-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--brand-soft); color: var(--brand);
      display: flex; align-items: center; justify-content: center;
      font: 600 22px var(--font);
    }
    .pwg-who { min-width: 0; }
    .pwg-name { font: 600 17px/1.3 var(--font); overflow-wrap: anywhere; }
    .pwg-meta { margin-top: 3px; color: var(--text-muted); font-size: 12.5px; }
    .pwg-num { font-family: var(--font-mono, ui-monospace, monospace); }
    .pwg-status { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--text-muted); min-height: 20px; }
    .pwg-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); flex: none; }
    .pwg-dot.green { background: var(--ok); }
    .pwg-dot.amber { background: var(--warn); }
    .pwg-dot.red { background: var(--danger); }
    .pwg-timer { font: 600 15px var(--font-mono, ui-monospace, monospace); color: var(--text); }
    .pwg-actions { display: flex; flex-direction: column; gap: 8px; align-items: center; }
    .pwg-call {
      display: inline-flex; align-items: center; gap: 8px;
      border: 0; border-radius: 999px; cursor: pointer;
      padding: 12px 26px; font: 600 14px var(--font);
      background: var(--ok); color: #fff;
    }
    .pwg-call:hover { filter: brightness(0.94); }
    .pwg-call[disabled] { opacity: 0.55; cursor: default; }
    .pwg-call .isvg { width: 16px; height: 16px; }
    .pwg-ghost {
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      border-radius: 8px; padding: 7px 14px; font: 500 12.5px var(--font); cursor: pointer;
    }
    .pwg-ghost:hover { background: var(--surface-2, var(--surface)); }
    .pwg-note { max-width: 300px; font-size: 12.5px; color: var(--text-muted); }
    .pwg-note.err { color: var(--danger); }
    .pwg-note a { color: var(--brand); }
  </style>
</head>
<body class="app pwg">
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <symbol id="pwg-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></symbol>
  </svg>
  <div class="pwg-head">
    <svg class="isvg"><use href="#pwg-phone"/></svg>
    <span class="pwg-title">Phone</span>
    <span class="pwg-line" id="pwgLine"></span>
  </div>
  <div class="pwg-main" id="pwgMain">
    <div class="pwg-status"><span class="pwg-dot"></span><span>Loading</span></div>
  </div>
  <script src="assets/js/wl-theme.js"></script>
  <script src="assets/js/bd-phone.js"></script>
  <script src="assets/js/phone-widget.js"></script>
</body>
</html>
