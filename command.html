<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command Center, RecruiterOS</title>
  <meta name="description" content="The RecruiterOS Command Center: Overview, Campaigns, Prospects, Outreach, Response, Accounts, Connected, and ATS, on one engine." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/app.css" />
  <link rel="stylesheet" href="assets/css/command.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%237c5cff'/><text x='50' y='70' font-size='62' text-anchor='middle' fill='%230a0a12' font-family='Arial' font-weight='bold'>R</text></svg>" />
</head>
<body class="app">
  <div class="aurora"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span></div>

  <div class="shell">
    <!-- SIDEBAR -->
    <aside class="sidebar cmd-side">
      <a href="index.html" class="brand"><span class="logo">R</span><span>Recruiter<span class="os">OS</span></span></a>

      <div class="ws-card" id="wsCard">
        <div class="ws-name" id="wsName">Workspace</div>
        <div class="ws-plan" id="wsPlan">Trial</div>
      </div>

      <div class="motion-toggle" id="motionToggle">
        <button class="mt active" data-motion="recruiting">👤 Recruiting</button>
        <button class="mt" data-motion="bd">🏢 BD</button>
      </div>

      <nav class="cmd-nav" id="cmdNav">
        <div class="nav-group">Operate</div>
        <a class="nav-item" data-route="overview"><span class="ni">🛰️</span> Overview</a>
        <a class="nav-item" data-route="response"><span class="ni">💬</span> Response <span class="ni-badge" id="badgeResponse"></span></a>
        <a class="nav-item" data-route="prospects"><span class="ni">🧑‍💼</span> Prospects</a>

        <div class="nav-group">Build</div>
        <a class="nav-item" data-route="campaigns"><span class="ni">🎯</span> Campaigns</a>
        <a class="nav-item" data-route="outreach"><span class="ni">✉️</span> Outreach</a>
        <a class="nav-item" data-route="content"><span class="ni">📚</span> Content</a>

        <div class="nav-group">Connect</div>
        <a class="nav-item" data-route="accounts" data-cap="accounts:manage"><span class="ni">📇</span> Accounts</a>
        <a class="nav-item" data-route="connected" data-cap="integrations:manage"><span class="ni">🔌</span> Connected</a>
        <a class="nav-item" data-route="ats" data-cap="ats:manage"><span class="ni">🗂️</span> ATS</a>

        <div class="nav-group" data-cap="team:manage">Admin</div>
        <a class="nav-item" data-route="team" data-cap="team:manage"><span class="ni">👥</span> Team</a>
      </nav>

      <div class="side-foot">
        <div class="side-link" id="userChip">
          <span class="avatar" style="width:26px;height:26px;font-size:11px;background:#7c5cff" id="userInitials">JD</span>
          <span id="userName">Jamie Dawson</span>
        </div>
        <div class="side-link" id="signOut">↩︎ Sign out</div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="topbar">
        <div>
          <div class="crumb" id="crumb">RecruiterOS</div>
          <h1 id="pageTitle">Overview</h1>
        </div>
        <div class="spacer"></div>
        <div class="env-pill" id="envPill" title="Connection mode">demo</div>
        <a class="btn btn-primary btn-sm" id="primaryAction">＋ New campaign</a>
      </div>

      <div class="panel-wrap">
        <section class="panel active" id="view"></section>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>
  <script src="assets/js/command.js"></script>
</body>
</html>
