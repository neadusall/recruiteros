# RecruitersOS on Hetzner: app + Caddy (automatic HTTPS via Let's Encrypt).
# Caddy terminates TLS for recruitersos.co and proxies to the Next app.

# Shared liveness probe for the Node/Next services. Dependency-free (no curl/wget
# needed in the image): asks the in-container server for "/" and treats ANY reply
# under 500 as healthy — a login redirect or a 404 still means the process is up;
# only a 5xx or a refused connection marks it unhealthy. The `autoheal` service
# below then restarts anything that goes unhealthy, so a wedged container recovers
# on its own instead of silently 502-ing behind Caddy.
x-node-health: &node-health
  test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\""]
  interval: 30s
  timeout: 8s
  retries: 3
  start_period: 60s

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # Read POSTGRES_PASSWORD from the SAME file the app uses (.env.production),
    # so the database and the app always share one password. Do NOT set it via
    # `${POSTGRES_PASSWORD}` substitution here: Compose substitutes that from a
    # file literally named `.env` (or the shell), never from .env.production —
    # which silently gave the db a different password than the app, breaking
    # persistence and logging everyone out on every deploy.
    env_file: .env.production
    environment:
      POSTGRES_USER: recruiteros
      POSTGRES_DB: recruiteros
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruiteros"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file: .env.production
    environment:
      # Durable persistence with ZERO config: the app snapshots accounts,
      # sessions, workspaces, etc. to JSON files under /data — a named volume
      # that survives every redeploy. No DB password, no volume-init matching,
      # no manual enable step. This is what stops the "logged out + create a new
      # account on every deploy" bug for good. (Set DATABASE_URL to opt into
      # Postgres instead; it takes precedence.)
      ROS_DATA_DIR: /data
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_env}
      # Owner Console allow-list (comma-separated). Only these emails can open
      # the owner back office; everyone else gets a 404. Set here (env > env_file)
      # so it's deterministic across deploys. neadusall@gmail.com is kept as a
      # backup owner so a typo/missing account can't lock the console.
      OWNER_EMAIL: "neadusall@gmail.com,ryan@recruiters.co"
      # Owner login bootstrap — guarantees the owner can ALWAYS sign in, even
      # after a store wipe and with password-reset email unconfigured. On boot
      # the app create-or-resets a login account for every OWNER_EMAIL with this
      # password. OWNER_BOOTSTRAP_RESET is a one-shot nonce: bump it to force a
      # reset of EXISTING accounts (covers a lost password). TEMPORARY — change
      # the password in-app after first login; create-if-missing then leaves your
      # chosen password untouched on future deploys. Rotate this value afterwards.
      OWNER_BOOTSTRAP_PASSWORD: "Schnead42!"
      OWNER_BOOTSTRAP_RESET: "2026-06-16-1"
      # White-label custom domains: the host customers CNAME their domain to.
      # Must resolve to this server — recruitersos.co already has the A record and
      # is served by Caddy, so on-demand TLS can issue certs for the CNAMEd host.
      WHITE_LABEL_CNAME_TARGET: recruitersos.co
      # JD Sourcing → Laxis first-pass enrichment: where the browser worker lives on the
      # internal network. Setting this is what turns the "Enrich via Laxis" button on
      # (the worker still needs LAXIS_EMAIL/LAXIS_PASSWORD in .env.production to log in).
      LAXIS_WORKER_URL: http://laxis-worker:3000
    volumes:
      - app_data:/data
    expose:
      - "3000"
    # not published to the host directly; Caddy reaches it on the internal net
    healthcheck: *node-health
    labels:
      autoheal: "true"   # restart this container if it goes unhealthy

  # OS Text (taltxt): the standalone SMS app, embedded in the portal under the
  # "OS Text" route via an iframe. Source is the money-maker-sms git submodule;
  # Caddy serves it on its own subdomain (taltxt.recruitersos.co).
  #
  # STORAGE = Neon (managed Postgres). Set DATABASE_URL to your Neon connection
  # string in money-maker-sms/.env.production. We keep taltxt on Neon so the
  # consolidation onto this box is a clean cutover with NO data migration — the
  # live data stays where it already is. Because storage is external, taltxt does
  # NOT depend on the local `db` service (that one stays available only for
  # opting the main app onto Postgres later).
  taltxt:
    build: ./money-maker-sms
    restart: unless-stopped
    # taltxt's own secrets (Telnyx, SMTP, QStash, Anthropic, AUTH_*, and the Neon
    # DATABASE_URL). required:false so a missing/empty file never takes down the
    # whole stack — the container just runs without those keys until you fill it in.
    env_file:
      - path: ./money-maker-sms/.env.production
        required: false
    expose:
      - "3000"
    # not published to the host directly; Caddy reaches it on the internal net
    healthcheck: *node-health
    labels:
      autoheal: "true"   # restart this container if it goes unhealthy

  # Lume jobs backend: powers the lumesp.com job board + the team /portal that
  # adds/deletes jobs and collects applications. Dependency-free Node service;
  # Caddy proxies only /api/* on lumesp.com to it. Data persists on its own
  # named volume so postings/applications survive every redeploy.
  lume-jobs:
    build: ./lume-jobs
    restart: unless-stopped
    # Team login + cookie secret + optional email forwarding live in the shared
    # env file. required:false so a missing file never takes down the stack —
    # the service then runs with built-in defaults (change them before go-live).
    env_file:
      - path: .env.production
        required: false
    volumes:
      - lume_jobs_data:/data
    expose:
      - "3000"
    # not published to the host directly; Caddy reaches it on the internal net
    healthcheck: *node-health
    labels:
      autoheal: "true"   # restart this container if it goes unhealthy

  # Laxis worker: a headless-Chromium sidecar that enriches JD-Sourcing CSVs through
  # app.laxis.tech/prospect-search (Laxis has no API). The main app POSTs a CSV to it
  # over the internal network (http://laxis-worker:3000); Caddy never exposes it. The
  # browser session (cookies) persists on its own named volume so it logs into Laxis
  # ONCE and reuses it — no re-login per job, no repeated 2FA/captcha exposure.
  #
  # Set LAXIS_EMAIL + LAXIS_PASSWORD (your Laxis login) in .env.production to enable it.
  # Without them the container runs but every job fails with laxis_credentials_missing.
  laxis-worker:
    build: ./laxis-worker
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      # Where the persisted Laxis session lives (on the named volume below).
      LAXIS_STATE_PATH: /data/laxis-state.json
    volumes:
      - laxis_data:/data
    expose:
      - "3000"
    # not published to the host directly; the app reaches it on the internal net
    healthcheck: *node-health
    labels:
      autoheal: "true"   # restart this container if it goes unhealthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
      - taltxt
      - lume-jobs
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Static white-label marketing site (lumesp.com) served by Caddy from here.
      - ./lumesp-web:/srv/lumesp:ro
      - caddy_data:/data
      - caddy_config:/config
    # NOTE: depends_on above is start-ORDER only (no `condition: service_healthy`).
    # That's deliberate — Caddy must come up and serve recruitersos.co even if
    # taltxt or lume-jobs is unhealthy, so a broken side-service never takes the
    # main site down. autoheal (below) recovers the sick container in the background.

  # Watches for any container marked `autoheal=true` that Docker reports unhealthy
  # and restarts it — Docker does NOT auto-restart on unhealthy by itself, only on
  # exit. This is what makes a wedged app/taltxt/lume-jobs self-recover with no human
  # on call. It needs the Docker socket to issue the restart (a POST), so the mount
  # is read-write — which is root-equivalent on the host, acceptable on this
  # single-tenant box. (If you ever want to lock it down, front it with a
  # docker-socket-proxy that only allows container restart.)
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: "15"        # seconds between checks
      AUTOHEAL_START_PERIOD: "60"    # grace before the first restart can fire
      DOCKER_SOCK: /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  caddy_data:
  caddy_config:
  pg_data:
  app_data:   # durable JSON snapshots (accounts/sessions/workspaces) — survives redeploys
  lume_jobs_data:  # lumesp.com job postings + applications — survives redeploys
  laxis_data:  # persisted Laxis browser session (cookies) — survives redeploys
