# RecruiterOS on Hetzner: app + Caddy (automatic HTTPS via Let's Encrypt).
# Caddy terminates TLS for recruitersos.co and proxies to the Next app.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # Read POSTGRES_PASSWORD from the SAME file the app uses (.env.production),
    # so the database and the app always share one password. Do NOT set it via
    # `${POSTGRES_PASSWORD}` substitution here: Compose substitutes that from a
    # file literally named `.env` (or the shell), never from .env.production —
    # which silently gave the db a different password than the app, breaking
    # persistence and logging everyone out on every deploy.
    env_file: .env.production
    environment:
      POSTGRES_USER: recruiteros
      POSTGRES_DB: recruiteros
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruiteros"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file: .env.production
    environment:
      # Durable persistence with ZERO config: the app snapshots accounts,
      # sessions, workspaces, etc. to JSON files under /data — a named volume
      # that survives every redeploy. No DB password, no volume-init matching,
      # no manual enable step. This is what stops the "logged out + create a new
      # account on every deploy" bug for good. (Set DATABASE_URL to opt into
      # Postgres instead; it takes precedence.)
      ROS_DATA_DIR: /data
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_env}
    volumes:
      - app_data:/data
    expose:
      - "3000"
    # not published to the host directly; Caddy reaches it on the internal net

  # LinkedIn scraper sidecar: the open-source Playwright scraper behind the
  # "Pull LinkedIn profiles" flow, as an ALTERNATIVE engine to Unipile. Heavy
  # (Chromium) so it lives in its own container; the app reaches it on the
  # internal net at http://scraper:8000 and NEVER exposes it publicly. Auth is a
  # single li_at cookie (LINKEDIN_LI_AT); SCRAPER_TOKEN gates the scrape routes.
  scraper:
    build: ./scraper
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      # Single browser, serialized scrapes, conservative caps — set in engine.py
      # but overridable here without a rebuild.
      SCRAPER_HEADLESS: "true"
    expose:
      - "8000"
    # not published to the host directly; only the app container calls it

  # OS Text (taltxt): the standalone SMS app, embedded in the portal under the
  # "OS Text" route via an iframe. Source is the money-maker-sms git submodule;
  # Caddy serves it on its own subdomain (taltxt.recruitersos.co). It uses Neon
  # (DATABASE_URL in its env file) for storage — no local Postgres needed.
  taltxt:
    build: ./money-maker-sms
    restart: unless-stopped
    # Reuses the shared `db` Postgres (its own `taltxt` database) — set
    # DATABASE_URL=postgres://recruiteros:<POSTGRES_PASSWORD>@db:5432/taltxt in
    # the env file below. Wait for Postgres to be healthy before starting.
    depends_on:
      db:
        condition: service_healthy
    # taltxt's own secrets (Telnyx, SMTP, QStash, Anthropic, AUTH_*, DATABASE_URL).
    # required:false so a missing/empty file never takes down the whole stack —
    # the container just runs without those keys until you fill it in.
    env_file:
      - path: ./money-maker-sms/.env.production
        required: false
    expose:
      - "3000"
    # not published to the host directly; Caddy reaches it on the internal net

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
      - taltxt
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
  pg_data:
  app_data:   # durable JSON snapshots (accounts/sessions/workspaces) — survives redeploys
