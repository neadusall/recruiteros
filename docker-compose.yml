# RecruiterOS on Hetzner: app + Caddy (automatic HTTPS via Let's Encrypt).
# Caddy terminates TLS for recruiteros.co and proxies to the Next app.
services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env.production
    expose:
      - "3000"
    # not published to the host directly; Caddy reaches it on the internal net

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
